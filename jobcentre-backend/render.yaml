services:
  - type: web
    name: abantu-job-centre-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python manage.py migrate && python manage.py collectstatic --noinput
    startCommand: gunicorn config.wsgi:application
    healthCheckPath: /api/health/

    envVars:
      - key: DEBUG
        value: "False"

      - key: SECRET_KEY
        generateValue: true

      - key: DATABASE_URL
        fromDatabase:
          name: abantu-job-centre-db
          property: connectionString

      - key: ALLOWED_HOSTS
        sync: false

      - key: CORS_ALLOWED_ORIGINS
        sync: false

      - key: FRONTEND_URL
        sync: false

      - key: PILOT_INVITE_CODE
        sync: false

      - key: MEDIA_ROOT
        value: /var/data/media

    disk:
      name: media
      mountPath: /var/data/media
      sizeGB: 5

databases:
  - name: abantu-job-centre-db
    databaseName: jobcentre
    user: jobcentre